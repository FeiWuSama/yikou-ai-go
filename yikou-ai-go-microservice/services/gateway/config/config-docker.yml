server:
  port: 8000
  context-path: /
  config-active: docker

nacos:
  host: nacos
  port: 8848
  namespace-id: public
  username: nacos
  password: nacos
  log-dir: /tmp/nacos/log
  cache-dir: /tmp/nacos/cache
  log-level: info

proxy:
  routes:
    - path: /api/user
      service: user-service
      strip-prefix: /api
    - path: /api/screenshot
      service: screenshot-service
      strip-prefix: /api
    - path: /api/app
      service: app-service
      strip-prefix: /api
    - path: /api/ai
      service: ai-service
      strip-prefix: /api
