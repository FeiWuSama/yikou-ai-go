server:
  port: 8123
  context-path: /
  config-active: local

# Nacos 服务发现配置
nacos:
  host: localhost
  port: 8848
  namespace-id: public
  username: nacos
  password: nacos
  log-dir: /tmp/nacos/log
  cache-dir: /tmp/nacos/cache
  log-level: info

# 反向代理路由配置
proxy:
  routes:
    - path: /api/user
      service: user-service
      strip-prefix: /api
    - path: /api/screenshot
      service: screenshot-service
      strip-prefix: /api
    - path: /api/app
      service: app-service
      strip-prefix: /api
    - path: /api/ai
      service: ai-service
      strip-prefix: /api
