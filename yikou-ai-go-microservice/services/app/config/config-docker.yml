server:
  port: 8082
  context-path: /api
  config-active: docker

database:
  host: mysql
  port: 3306
  username: root
  password: ${MYSQL_ROOT_PASSWORD:-root123456}
  dbname: yikou_ai

redis:
  host: redis
  port: 6379
  password: ""
  db: 0

ai:
  chat-model:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:-your-api-key}
    model-name: deepseek-v3.2
    memory-store: redis
    memory-ttl: 3600
  reasoning-chat-model:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:-your-api-key}
    model-name: deepseek-v3.2
    memory-store: redis
    memory-ttl: 3600

nacos:
  host: nacos
  port: 8848
  namespace-id: public
  username: nacos
  password: nacos
  log-dir: /tmp/nacos/log
  cache-dir: /tmp/nacos/cache
  log-level: info

rpc:
  user-service: user-service:9090
  screenshot-service: screenshot-service:9091
  ai-service: ai-service:9093
